version: '3.8'
services:
  backend:
    build: 
      context: .  
      dockerfile: ./backend/Dockerfile
    container_name: edu_backend
    restart: always
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    environment:
      - INIT_ADMIN_USER=admin
      - INIT_ADMIN_PASS=Admin@123456
      - TZ=Asia/Shanghai
  frontend:
    build: 
      context: ./frontend
    container_name: edu_frontend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - backend
