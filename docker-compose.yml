version: '3.8'
services:
  backend:
    build: 
      context: .  
      dockerfile: backend.Dockerfile
    image: openjwc-backend:v1.1
    container_name: openjwc_backend
    restart: always
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/admins.json:/app/admins.json:ro
    environment:
      - TZ=Asia/Shanghai
  crawler_worker:
    build: 
      context: .
      dockerfile: backend.Dockerfile
    image: openjwc-crawler:v1.1
    container_name: crawler_worker
    restart: always
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    command: ["uv", "run", "python", "-m", "app.infrastructure.crawler.rust_crawler_wrapper"]
    depends_on:
      - backend
  frontend:
    build: 
      context: .
      dockerfile: frontend.Dockerfile
    container_name: openjwc_frontend
    image: openjwc-frontend:v1.1
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - backend
